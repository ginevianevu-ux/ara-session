<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>아라 · 빙의 세션</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;500;600&family=Cinzel:wght@400;600&family=Noto+Sans+KR:wght@300;400;500&family=Gowun+Dodum&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1510;
    --paper: #f5f0e8;
    --paper2: #ede8dc;
    --gold: #b8963e;
    --gold-light: #d4b06a;
    --red: #8b2635;
    --muted: #7a6e60;
    --border: #c8b99a;
    --shadow: rgba(26,21,16,0.15);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--ink);
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* 배경 텍스처 */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      repeating-linear-gradient(0deg, transparent, transparent 40px, rgba(184,150,62,0.03) 40px, rgba(184,150,62,0.03) 41px),
      repeating-linear-gradient(90deg, transparent, transparent 40px, rgba(184,150,62,0.03) 40px, rgba(184,150,62,0.03) 41px);
    pointer-events: none;
    z-index: 0;
  }

  header {
    background: var(--ink);
    padding: 18px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid rgba(184,150,62,0.3);
    position: relative;
    z-index: 10;
  }

  .logo {
    font-family: 'Cinzel', serif;
    font-size: 22px;
    color: var(--gold);
    letter-spacing: 6px;
    text-transform: uppercase;
  }

  .logo span {
    color: rgba(184,150,62,0.4);
    font-size: 11px;
    display: block;
    letter-spacing: 3px;
    margin-top: 2px;
    font-family: 'Noto Sans KR', sans-serif;
    font-weight: 300;
  }

  .header-actions {
    display: flex;
    gap: 10px;
    align-items: center;
  }

  .btn {
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 12px;
    font-weight: 400;
    padding: 7px 16px;
    border-radius: 2px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.5px;
    border: none;
  }

  .btn-ghost {
    background: transparent;
    color: var(--gold);
    border: 1px solid rgba(184,150,62,0.4);
  }
  .btn-ghost:hover { border-color: var(--gold); background: rgba(184,150,62,0.08); }

  .btn-primary {
    background: var(--gold);
    color: var(--ink);
    font-weight: 600;
  }
  .btn-primary:hover { background: var(--gold-light); }

  .btn-danger {
    background: transparent;
    color: var(--red);
    border: 1px solid rgba(139,38,53,0.4);
    font-size: 11px;
  }
  .btn-danger:hover { background: rgba(139,38,53,0.1); border-color: var(--red); }

  /* 메인 레이아웃 */
  .app {
    display: flex;
    flex: 1;
    height: calc(100vh - 61px);
    position: relative;
    z-index: 1;
  }

  /* 사이드바 */
  .sidebar {
    width: 280px;
    background: #110e09;
    border-right: 1px solid rgba(184,150,62,0.2);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    flex-shrink: 0;
  }

  .sidebar-section {
    border-bottom: 1px solid rgba(184,150,62,0.15);
    padding: 16px;
  }

  .sidebar-section:last-child { border-bottom: none; flex: 1; overflow-y: auto; }

  .section-title {
    font-family: 'Cinzel', serif;
    font-size: 10px;
    color: #c8a855;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  /* API 키 */
  .api-input-wrap { position: relative; }
  .api-input-wrap input {
    width: 100%;
    background: rgba(184,150,62,0.08);
    border: 1px solid rgba(184,150,62,0.3);
    border-radius: 4px;
    padding: 10px 36px 10px 12px;
    color: #e8d5a0;
    font-size: 13px;
    font-family: monospace;
    outline: none;
  }
  .api-input-wrap input:focus { border-color: var(--gold); background: rgba(184,150,62,0.12); }
  .api-input-wrap input::placeholder { color: rgba(184,150,62,0.4); font-size: 12px; }
  .toggle-key {
    position: absolute;
    right: 8px; top: 50%;
    transform: translateY(-50%);
    background: none; border: none;
    color: rgba(184,150,62,0.7);
    cursor: pointer; font-size: 16px;
    padding: 6px;
    -webkit-tap-highlight-color: transparent;
  }
  .toggle-key:hover { color: var(--gold); }

  .model-select {
    width: 100%;
    background: rgba(184,150,62,0.08);
    border: 1px solid rgba(184,150,62,0.3);
    border-radius: 4px;
    padding: 9px 10px;
    color: #e8d5a0;
    font-size: 13px;
    outline: none;
    cursor: pointer;
    margin-top: 8px;
  }
  .model-select option { background: #1a1510; color: #e8d5a0; }

  /* 캐릭터카드 목록 */
  .char-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 10px; }

  .char-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 10px;
    border-radius: 2px;
    cursor: pointer;
    border: 1px solid rgba(184,150,62,0.15);
    transition: all 0.2s;
    background: rgba(184,150,62,0.04);
  }
  .char-item:hover { background: rgba(184,150,62,0.1); border-color: rgba(184,150,62,0.35); }
  .char-item.active { background: rgba(184,150,62,0.18); border-color: var(--gold); }

  .char-avatar {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--gold), var(--red));
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; color: var(--ink); font-weight: 600;
    flex-shrink: 0;
    font-family: 'Cinzel', serif;
  }

  .char-name { color: #e8e0d0; font-size: 13px; font-weight: 500; flex: 1; }
  .char-delete { background: none; border: none; color: rgba(184,150,62,0.5); cursor: pointer; font-size: 16px; padding: 4px 6px; }
  .char-delete:hover { color: var(--red); }

  .add-char-btn {
    width: 100%;
    background: transparent;
    border: 1px dashed rgba(184,150,62,0.25);
    border-radius: 2px;
    color: rgba(184,150,62,0.5);
    font-size: 12px;
    padding: 8px;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'Noto Sans KR', sans-serif;
  }
  .add-char-btn:hover { border-color: var(--gold); color: var(--gold); }

  /* 메인 영역 */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    background: var(--paper);
    overflow: hidden;
  }

  /* 탭 */
  .tabs {
    display: flex;
    background: var(--paper2);
    border-bottom: 1px solid var(--border);
  }
  .tab {
    padding: 12px 24px;
    font-size: 12px;
    font-weight: 400;
    cursor: pointer;
    color: var(--muted);
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
    letter-spacing: 0.5px;
  }
  .tab:hover { color: var(--ink); }
  .tab.active { color: var(--gold); border-bottom-color: var(--gold); font-weight: 600; }

  /* 탭 콘텐츠 */
  .tab-content { display: none; flex: 1; overflow: hidden; flex-direction: column; }
  .tab-content.active { display: flex; }

  /* 설정 탭 */
  .settings-panel {
    padding: 28px 32px;
    overflow-y: auto;
    flex: 1;
  }

  .field-group { margin-bottom: 24px; }
  .field-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--muted);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-bottom: 8px;
    display: block;
  }

  textarea, .text-input {
    width: 100%;
    background: white;
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 12px 14px;
    font-family: 'Noto Serif KR', serif;
    font-size: 13px;
    color: var(--ink);
    outline: none;
    line-height: 1.7;
    resize: vertical;
    transition: border-color 0.2s;
  }
  textarea:focus, .text-input:focus { border-color: var(--gold); }
  textarea::placeholder, .text-input::placeholder { color: #bbb; }

  .char-card-form {
    background: white;
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 20px;
  }

  .form-row { display: flex; gap: 12px; margin-bottom: 14px; }
  .form-row .field-group { flex: 1; margin-bottom: 0; }

  /* 채팅 탭 */
  .chat-header {
    padding: 14px 24px;
    background: var(--paper2);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .chat-char-name {
    font-family: 'Cinzel', serif;
    font-size: 15px;
    color: var(--ink);
    font-weight: 600;
  }
  .chat-char-name span { font-size: 11px; color: var(--muted); font-family: 'Noto Sans KR', sans-serif; font-weight: 300; margin-left: 10px; }

  .chat-actions { display: flex; gap: 8px; }

  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 24px 32px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .message {
    display: flex;
    gap: 14px;
    animation: fadeUp 0.3s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .message.user { flex-direction: row-reverse; }

  .msg-avatar {
    width: 34px; height: 34px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 600;
    flex-shrink: 0;
    font-family: 'Cinzel', serif;
  }

  .message.user .msg-avatar {
    background: var(--ink);
    color: var(--gold);
  }
  .message.assistant .msg-avatar {
    background: linear-gradient(135deg, var(--gold), var(--red));
    color: var(--ink);
  }

  .msg-bubble {
    max-width: 75%;
    padding: 16px 20px;
    border-radius: 2px;
    font-family: 'Gowun Dodum', 'Noto Serif KR', serif;
    font-size: 15px;
    line-height: 2.1;
    color: var(--ink);
    word-break: keep-all;
    white-space: pre-wrap;
  }

  /* 행동지문 *별표* → 이탤릭 + 색상 */
  .msg-bubble .action {
    font-style: italic;
    color: var(--muted);
    font-size: 14px;
  }

  /* 독백 [대괄호] → 색상 구분 */
  .msg-bubble .thought {
    color: #7a5c8a;
    font-style: italic;
    font-size: 14px;
  }

  /* 대사 "큰따옴표" → 약간 강조 */
  .msg-bubble .speech {
    color: #1a1510;
    font-weight: 500;
  }

  .message.user .msg-bubble {
    background: var(--ink);
    color: var(--paper);
    border-radius: 2px 2px 2px 12px;
  }
  .message.assistant .msg-bubble {
    background: white;
    border: 1px solid var(--border);
    border-radius: 2px 2px 12px 2px;
  }

  .msg-time {
    font-size: 10px;
    color: var(--muted);
    opacity: 0.6;
    margin-top: 4px;
    font-family: 'Noto Sans KR', sans-serif;
  }
  .message.user .msg-time { text-align: right; }

  .thinking {
    display: flex;
    gap: 5px;
    padding: 16px 18px;
    background: white;
    border: 1px solid var(--border);
    border-radius: 2px 2px 12px 2px;
    width: fit-content;
  }
  .thinking span {
    width: 6px; height: 6px;
    background: var(--gold);
    border-radius: 50%;
    animation: pulse 1.2s infinite;
  }
  .thinking span:nth-child(2) { animation-delay: 0.2s; }
  .thinking span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes pulse {
    0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); }
    40% { opacity: 1; transform: scale(1); }
  }

  /* 입력 영역 */
  .input-area {
    padding: 16px 24px 20px;
    background: var(--paper2);
    border-top: 1px solid var(--border);
  }

  .input-wrap {
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }

  .chat-input {
    flex: 1;
    background: white;
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 12px 16px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 13px;
    color: var(--ink);
    outline: none;
    resize: none;
    line-height: 1.6;
    max-height: 120px;
    overflow-y: auto;
    transition: border-color 0.2s;
  }
  .chat-input:focus { border-color: var(--gold); }
  .chat-input::placeholder { color: #bbb; }

  .auto-btn {
    background: transparent;
    border: 1px solid rgba(184,150,62,0.5);
    border-radius: 4px;
    width: 44px; height: 44px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
    color: var(--gold);
    font-size: 16px;
  }
  .auto-btn:hover { background: rgba(184,150,62,0.12); border-color: var(--gold); }
  .auto-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .send-btn {
    background: var(--gold);
    border: none;
    border-radius: 4px;
    width: 44px; height: 44px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .send-btn:hover { background: var(--gold-light); }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .send-btn svg { width: 18px; height: 18px; fill: var(--ink); }

  /* 요약 탭 */
  .summary-panel {
    padding: 28px 32px;
    overflow-y: auto;
    flex: 1;
  }

  .summary-box {
    width: 100%;
    background: white;
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 20px 24px;
    font-family: 'Gowun Dodum', 'Noto Serif KR', serif;
    font-size: 14px;
    line-height: 1.9;
    color: var(--ink);
    resize: vertical;
    outline: none;
    transition: border-color 0.2s;
  }
  .summary-box:focus { border-color: var(--gold); }

  .summary-placeholder {
    color: #bbb;
    font-style: italic;
    font-size: 13px;
  }

  /* 모달 */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(10,8,5,0.85);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--paper);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 28px 32px;
    width: 500px;
    max-width: 90vw;
    max-height: 80vh;
    overflow-y: auto;
  }

  .modal-title {
    font-family: 'Cinzel', serif;
    font-size: 16px;
    color: var(--ink);
    margin-bottom: 20px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }

  .modal-actions {
    display: flex;
    gap: 10px;
    justify-content: flex-end;
    margin-top: 20px;
    padding-top: 16px;
    border-top: 1px solid var(--border);
  }

  /* 토스트 */
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--ink);
    color: var(--gold);
    padding: 10px 20px;
    border-radius: 2px;
    font-size: 12px;
    border: 1px solid rgba(184,150,62,0.3);
    z-index: 200;
    opacity: 0;
    transform: translateY(10px);
    transition: all 0.3s;
    pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateY(0); }

  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: var(--muted);
    text-align: center;
    padding: 40px;
    gap: 12px;
  }
  .empty-state .empty-icon { font-size: 40px; opacity: 0.3; }
  .empty-state p { font-size: 13px; line-height: 1.7; }

  /* 스크롤바 */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(184,150,62,0.3); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(184,150,62,0.5); }

  .token-counter {
    font-size: 10px;
    color: var(--muted);
    text-align: right;
    margin-top: 4px;
    opacity: 0.7;
  }

  /* ========== 모바일 반응형 ========== */
  @media (max-width: 768px) {

    /* 헤더 */
    header { padding: 12px 16px; }
    .logo { font-size: 16px; letter-spacing: 3px; }
    .logo span { font-size: 9px; }
    .header-actions { gap: 6px; }
    .btn { font-size: 11px; padding: 6px 10px; }

    /* 레이아웃 — 사이드바 숨기고 하단 탭바로 */
    .app { flex-direction: column; height: calc(100vh - 49px); }

    .sidebar { display: none; }
    .sidebar.mobile-open {
      display: flex;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      z-index: 50;
      width: 100%;
      background: #110e09;
    }

    .main {
      flex: 1;
      height: 100%;
      overflow: hidden;
    }

    /* 상단 탭 숨기고 하단 탭바로 */
    .tabs { display: none; }

    .mobile-tabbar {
      display: flex;
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: var(--ink);
      border-top: 1px solid rgba(184,150,62,0.25);
      z-index: 40;
      height: 56px;
    }

    .mobile-tab {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      color: rgba(184,150,62,0.4);
      font-size: 9px;
      cursor: pointer;
      transition: color 0.2s;
      letter-spacing: 0.5px;
      border: none;
      background: none;
      font-family: 'Noto Sans KR', sans-serif;
      padding: 8px 0;
      -webkit-tap-highlight-color: transparent;
    }
    .mobile-tab .tab-icon { font-size: 18px; }
    .mobile-tab.active { color: var(--gold); }
    .mobile-tab.active .tab-icon { transform: scale(1.1); }

    /* 탭 콘텐츠 — 하단 탭바 여백 */
    .tab-content { padding-bottom: 56px; }

    /* 채팅 영역 */
    .chat-header { padding: 10px 14px; }
    .chat-char-name { font-size: 13px; }

    .messages {
      padding: 16px 12px;
      gap: 14px;
    }

    .msg-bubble {
      max-width: 90%;
      font-size: 14px;
      line-height: 2.0;
      padding: 12px 14px;
    }

    .msg-avatar {
      width: 28px; height: 28px;
      font-size: 11px;
    }

    /* 입력 영역 */
    .input-area {
      padding: 10px 12px 12px;
    }

    .chat-input {
      font-size: 15px;
      padding: 10px 12px;
      border-radius: 8px;
    }

    .send-btn, .auto-btn {
      width: 48px; height: 48px;
      border-radius: 8px;
      flex-shrink: 0;
    }
    .auto-btn { font-size: 18px; }

    /* 설정/요약 패널 */
    .settings-panel, .summary-panel {
      padding: 16px;
    }

    /* 사이드바 메뉴 버튼 */
    .sidebar-toggle {
      display: flex;
      align-items: center;
      justify-content: center;
      background: none;
      border: 1px solid rgba(184,150,62,0.3);
      color: var(--gold);
      border-radius: 4px;
      width: 32px; height: 32px;
      cursor: pointer;
      font-size: 16px;
      flex-shrink: 0;
    }

    /* 토스트 위치 — 하단 탭바 위로 */
    .toast { bottom: 68px; right: 12px; left: 12px; text-align: center; }
  }

  /* PC에서는 하단 탭바 숨김 */
  @media (min-width: 769px) {
    .mobile-tabbar { display: none; }
    .sidebar-toggle { display: none; }
  }
</style>
</head>
<body>

<header>
  <div style="display:flex; align-items:center; gap:10px;">
    <button class="sidebar-toggle" onclick="toggleMobileSidebar()" title="캐릭터 메뉴">☰</button>
    <div class="logo">
      아라
      <span>빙의 · 다크판타지 세션</span>
    </div>
  </div>
  <div class="header-actions">
    <button class="btn btn-ghost" onclick="exportSession()">내보내기</button>
    <button class="btn btn-ghost" onclick="document.getElementById('importFile').click()">불러오기</button>
    <input type="file" id="importFile" accept=".json" style="display:none" onchange="importSession(event)">
    <button class="btn btn-danger" onclick="clearSession()">초기화</button>
  </div>
</header>

<div class="app">
  <!-- 사이드바 -->
  <aside class="sidebar">
    <div class="sidebar-section">

// ========== Firebase 초기화 ==========
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import { getFirestore, doc, setDoc, getDoc, onSnapshot } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyAcme_aVMyPbxFx0qRlDNhhIX5qL1nOMnI",
  authDomain: "arrrra-58058.firebaseapp.com",
  projectId: "arrrra-58058",
  storageBucket: "arrrra-58058.firebasestorage.app",
  messagingSenderId: "172786297050",
  appId: "1:172786297050:web:48e88478e5070e2e025de3"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const SESSION_DOC = doc(db, 'sessions', 'ara-main');

// Firestore에 저장
window.saveToCloud = async function() {
  try {
    // sessions는 Firestore 크기 제한 때문에 JSON 문자열로 저장
    await setDoc(SESSION_DOC, {
      apiKey: state.apiKey,
      model: state.model,
      worldSetting: state.worldSetting,
      rpGuideline: state.rpGuideline,
      characters: JSON.stringify(state.characters),
      sessions: JSON.stringify(state.sessions),
      summaries: JSON.stringify(state.summaries),
      updatedAt: new Date().toISOString(),
    });
  } catch(e) {
    console.error('Cloud save error:', e);
    showToast('클라우드 저장 실패');
  }
};

// Firestore에서 불러오기
window.loadFromCloud = async function() {
  try {
    const snap = await getDoc(SESSION_DOC);
    if (!snap.exists()) return false;
    const data = snap.data();
    state.apiKey = data.apiKey || '';
    state.model = data.model || 'gemini-2.5-flash';
    state.worldSetting = data.worldSetting || '';
    state.rpGuideline = data.rpGuideline || '';
    state.characters = JSON.parse(data.characters || '[]');
    state.sessions = JSON.parse(data.sessions || '{}');
    state.summaries = JSON.parse(data.summaries || '{}');
    return true;
  } catch(e) {
    console.error('Cloud load error:', e);
    return false;
  }
};

// 실시간 동기화 — 다른 기기에서 저장하면 자동 반영
window.startSync = function() {
  onSnapshot(SESSION_DOC, (snap) => {
    if (!snap.exists()) return;
    const data = snap.data();
    // 내가 방금 저장한 것과 다를 때만 반영 (updatedAt 비교)
    if (data.updatedAt === window._lastSaveTime) return;
    state.apiKey = data.apiKey || '';
    state.model = data.model || 'gemini-2.5-flash';
    state.worldSetting = data.worldSetting || '';
    state.rpGuideline = data.rpGuideline || '';
    state.characters = JSON.parse(data.characters || '[]');
    state.sessions = JSON.parse(data.sessions || '{}');
    state.summaries = JSON.parse(data.summaries || '{}');
    // UI 갱신
    document.getElementById('apiKey').value = state.apiKey;
    document.getElementById('modelSelect').value = state.model;
    document.getElementById('worldSetting').value = state.worldSetting;
    document.getElementById('rpGuideline').value = state.rpGuideline;
    document.getElementById('summaryBox').value = state.summaries[window.NARRATOR_ID_REF] || '';
    renderCharList();
    renderMessages();
    updateTokenCounter();
    showToast('📱 다른 기기에서 동기화됨');
  });
};

// 앱 초기화 후 클라우드 로드
window.addEventListener('load', async () => {
  showToast('클라우드에서 불러오는 중...');
  const loaded = await loadFromCloud();
  if (loaded && state.characters.length > 0) {
    // 클라우드 데이터 있음 → UI 갱신
    localStorage.setItem('zeta_state', JSON.stringify(state));
    document.getElementById('apiKey').value = state.apiKey;
    document.getElementById('modelSelect').value = state.model || 'gemini-2.5-flash';
    document.getElementById('worldSetting').value = state.worldSetting;
    document.getElementById('rpGuideline').value = state.rpGuideline;
    document.getElementById('summaryBox').value = state.summaries['session_narrator'] || '';
    // 나레이터 세션 초기화
    if (!state.sessions['session_narrator']) state.sessions['session_narrator'] = [];
    if (!state.summaries['session_narrator']) state.summaries['session_narrator'] = '';
    renderCharList();
    renderMessages();
    updateTokenCounter();
    showToast('✅ 클라우드 동기화 완료');
  } else {
    // 클라우드 데이터 없음 → 기본값으로 init
    showToast('기본 설정으로 시작합니다');
    init();
  }
  startSync();
});
</script>

function init() {
  const saved = localStorage.getItem('zeta_state');
  if (saved) {
    try { Object.assign(state, JSON.parse(saved)); } catch(e) {}
  }

  // 최초 실행 시 기본 설정 주입
  if (!state.worldSetting) {
    state.worldSetting = DEFAULT_WORLD;
    state.rpGuideline = DEFAULT_GUIDELINE;
    state.model = 'gemini-2.5-flash';
    DEFAULT_CHARACTERS.forEach(dc => {
      if (!state.characters.find(c => c.id === dc.id)) {
        state.characters.push(dc);
        if (!state.sessions[dc.id]) state.sessions[dc.id] = [];
      }
    });
    save();
  } else {
    // 기존 사용자도 캐릭터 카드 desc 최신화 (id 기준)
    DEFAULT_CHARACTERS.forEach(dc => {
      const existing = state.characters.find(c => c.id === dc.id);
      if (existing) {
        existing.desc = dc.desc; // desc만 업데이트, 대화 기록은 유지
      } else {
        state.characters.push(dc);
        if (!state.sessions[dc.id]) state.sessions[dc.id] = [];
      }
    });
    save();
  }

  // 나레이터 세션 초기화
  if (!state.sessions[NARRATOR_ID]) state.sessions[NARRATOR_ID] = [];
  if (!state.summaries[NARRATOR_ID]) state.summaries[NARRATOR_ID] = '';

  // 요약 복원
  if (state.summaries[NARRATOR_ID]) {
    document.getElementById('summaryBox').value = state.summaries[NARRATOR_ID];
  }

  document.getElementById('apiKey').value = state.apiKey || '';
  document.getElementById('modelSelect').value = state.model || 'gemini-2.5-flash';
  document.getElementById('worldSetting').value = state.worldSetting || '';
  document.getElementById('rpGuideline').value = state.rpGuideline || '';
  renderCharList();
  renderMessages();
  updateTokenCounter();
}

function save() {
  localStorage.setItem('zeta_state', JSON.stringify(state));
  // 클라우드 저장 (debounce — 1.5초 후)
  clearTimeout(window._saveTimer);
  window._saveTimer = setTimeout(async () => {
    if (window.saveToCloud) {
      window._lastSaveTime = new Date().toISOString();
      await window.saveToCloud();
    }
  }, 1500);
}

function saveSettings() {
  state.apiKey = document.getElementById('apiKey').value.trim();
  state.model = document.getElementById('modelSelect').value;
  state.worldSetting = document.getElementById('worldSetting').value;
  state.rpGuideline = document.getElementById('rpGuideline').value;
  save();
}

// ========== 캐릭터 ==========
function renderCharList() {
  const list = document.getElementById('charList');
  list.innerHTML = '';
  state.characters.forEach(c => {
    const item = document.createElement('div');
    item.className = 'char-item' + (c.id === state.activeCharId ? ' active' : '');
    item.innerHTML = `
      <div class="char-avatar">${c.initial || c.name[0]}</div>
      <span class="char-name">${c.name}</span>
      <button class="char-delete" onclick="deleteChar('${c.id}', event)">×</button>
    `;
    item.onclick = (e) => { if (!e.target.classList.contains('char-delete')) selectChar(c.id); };
    list.appendChild(item);
  });
}

function selectChar(id) {
  state.activeCharId = id;
  save();
  renderCharList();
  const char = state.characters.find(c => c.id === id);
  if (!char) return;
  document.getElementById('currentCharName').textContent = char.name;
  renderMessages();
  updateTokenCounter();

  // 설정 탭에 캐릭터 편집 섹션 표시
  document.getElementById('charEditSection').style.display = 'block';
  document.getElementById('charEditLabel').textContent = `캐릭터 카드 — ${char.name}`;
  document.getElementById('editCharName').value = char.name;
  document.getElementById('editCharInitial').value = char.initial || '';
  document.getElementById('editCharDesc').value = char.desc || '';

  // 모바일: 사이드바 닫기
  const sidebar = document.querySelector('.sidebar');
  const overlay = document.getElementById('sidebarOverlay');
  if (sidebar.classList.contains('mobile-open')) {
    sidebar.classList.remove('mobile-open');
    overlay.style.display = 'none';
  }
}

function saveCharEdit() {
  if (!state.activeCharId) return;
  const char = state.characters.find(c => c.id === state.activeCharId);
  if (!char) return;
  char.name = document.getElementById('editCharName').value;
  char.initial = document.getElementById('editCharInitial').value;
  char.desc = document.getElementById('editCharDesc').value;
  save();
  renderCharList();
  document.getElementById('currentCharName').textContent = char.name;
}

function openAddChar() {
  document.getElementById('newCharName').value = '';
  document.getElementById('newCharInitial').value = '';
  document.getElementById('newCharDesc').value = '';
  document.getElementById('addCharModal').classList.add('open');
  setTimeout(() => document.getElementById('newCharName').focus(), 100);
}

function closeModal() {
  document.getElementById('addCharModal').classList.remove('open');
}

function addChar() {
  const name = document.getElementById('newCharName').value.trim();
  if (!name) { showToast('이름을 입력해주세요.'); return; }
  const id = 'char_' + Date.now();
  state.characters.push({
    id,
    name,
    initial: document.getElementById('newCharInitial').value.trim() || name[0],
    desc: document.getElementById('newCharDesc').value.trim(),
  });
  if (!state.sessions[id]) state.sessions[id] = [];
  save();
  closeModal();
  renderCharList();
  selectChar(id);
  showToast(`${name} 추가됨`);
}

function deleteChar(id, e) {
  e.stopPropagation();
  const char = state.characters.find(c => c.id === id);
  if (!confirm(`'${char?.name}' 캐릭터를 삭제할까요? 대화 기록도 함께 삭제됩니다.`)) return;
  state.characters = state.characters.filter(c => c.id !== id);
  delete state.sessions[id];
  delete state.summaries[id];
  if (state.activeCharId === id) {
    state.activeCharId = state.characters[0]?.id || null;
  }
  save();
  renderCharList();
  if (state.activeCharId) selectChar(state.activeCharId);
  else {
    document.getElementById('currentCharName').textContent = '캐릭터를 선택하세요';
    document.getElementById('messages').innerHTML = `<div class="empty-state"><div class="empty-icon">⚔</div><p>캐릭터를 선택하고<br>대화를 시작하세요.</p></div>`;
  }
}

// ========== 나레이터 세션 ID ==========
const NARRATOR_ID = 'session_narrator';

// ========== 메시지 렌더링 ==========
function renderMessages() {
  const msgs = document.getElementById('messages');
  const history = state.sessions[NARRATOR_ID] || [];
  const msgCount = document.getElementById('msgCount');

  if (!history.length) {
    msgs.innerHTML = `<div class="empty-state"><div class="empty-icon">✦</div><p>▶ 버튼으로 첫 장면을 열거나<br>아라의 행동을 입력하세요.</p></div>`;
    msgCount.textContent = '';
    return;
  }

  msgCount.textContent = `${history.filter(m=>m.role==='user').length}턴`;
  msgs.innerHTML = '';

  history.forEach(msg => {
    const isUser = msg.role === 'user';
    const text = msg.parts[0]?.text || '';
    const div = document.createElement('div');
    div.className = `message ${isUser ? 'user' : 'assistant'}`;
    div.innerHTML = `
      <div class="msg-avatar">${isUser ? '아' : '✦'}</div>
      <div>
        <div class="msg-bubble">${formatText(text)}</div>
      </div>
    `;
    msgs.appendChild(div);
  });

  msgs.scrollTop = msgs.scrollHeight;
}

// 텍스트 포맷 — *행동지문*, [독백], "대사" 색상 분리
function formatText(str) {
  const escaped = str
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;');

  return escaped
    // *행동지문* → 이탤릭 회색
    .replace(/\*([^*]+)\*/g, '<span class="action">*$1*</span>')
    // [독백] → 보라색 이탤릭
    .replace(/\[([^\]]+)\]/g, '<span class="thought">[$1]</span>')
    // 줄바꿈
    .replace(/\n/g, '<br>');
}

// ========== 나레이터 시스템 프롬프트 구성 ==========
function buildSystemPrompt() {
  const parts = [];

  // ★ 금지 규칙 최우선 — 맨 앞에 박음
  parts.push(`
# ██ 최우선 절대 규칙 — 반드시 먼저 읽을 것 ██

이 이야기에서 아라(아리아스티아)는 플레이어가 직접 조작하는 캐릭터다.
AI는 아라에 관한 다음 항목을 절대 출력하지 않는다. 예외 없음.

NEVER OUTPUT:
- 아라의 대사 (따옴표 유무 무관)
- 아라의 행동 서술 (동사 포함 문장)
- 아라의 결정이나 선택
- 아라의 내면 독백이나 생각
- "아라는 ~했다 / ~말했다 / ~느꼈다" 형태의 모든 문장

출력을 마칠 때 아라의 반응으로 끝내지 말 것.
반드시 다른 캐릭터의 행동, 대사, 또는 상황 묘사로 끝낼 것.
아라의 차례는 항상 플레이어에게 넘긴다.

# ██ 플레이어 입력 형식 ██

플레이어는 아래 형식으로 아라를 조작한다:
- 따옴표 없는 문장 → 아라의 대사
- (괄호 속 문장) → 아라의 행동 지문
- *별표 속 문장* → 아라의 속마음 (나레이터만 인지, 다른 캐릭터는 모름)

예시 입력)
레나르 폰 칼리스...?
(눈을 깜빡이며 천장을 본다)
*이름은 기억나는데 맥락이 없어. 일단 모르는 척.*

AI는 이 입력을 받아 주변 세계와 다른 캐릭터들의 반응만 출력한다.
`);

  if (state.worldSetting) parts.push(state.worldSetting);
  if (state.rpGuideline) parts.push(state.rpGuideline);

  // 캐릭터 카드 전체 주입 (아라 제외)
  state.characters
    .filter(c => c.id !== 'char_ara')
    .forEach(c => {
      if (c.desc) parts.push(`[캐릭터: ${c.name}]\n${c.desc}`);
    });

  if (state.summaries[NARRATOR_ID]) {
    parts.push(`[이전 세션 요약]\n${state.summaries[NARRATOR_ID]}`);
  }

  parts.push(`
# ██ 나레이터 역할 요약 ██

당신은 나레이터 겸 GM이다.
아라를 제외한 모든 캐릭터(카엘, 레나르, 이자벨라, 에리카, 엑스트라)와
장소·분위기·상황 묘사를 담당한다.
플레이어 입력 → 세계의 반응 출력. 아라의 반응은 절대 출력하지 않는다.

# ██ 출력 길이 규칙 ██

- 1회 출력은 최대 300자 이내로 제한한다
- 불필요한 미사여구, 반복 묘사, 감정 과잉 설명 금지
- 행동과 대사 위주로 간결하게
- 같은 내용을 다른 말로 반복하지 않는다
- 장면 묘사는 핵심 1~2문장으로 충분하다
- 캐릭터 내면을 장황하게 설명하지 않는다 (행동으로 보여줄 것)
`);

  return { parts: [{ text: parts.join('\n\n') }] };
}

// ========== API 호출 ==========
async function sendMessage() {
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if (!text) return;
  if (!state.apiKey) { showToast('API 키를 입력해주세요.'); switchTab('settings'); return; }

  // 나레이터 세션 초기화
  if (!state.sessions[NARRATOR_ID]) state.sessions[NARRATOR_ID] = [];
  state.sessions[NARRATOR_ID].push({ role: 'user', parts: [{ text }] });
  input.value = '';
  autoResize(input);
  save();
  renderMessages();

  // 로딩
  const msgs = document.getElementById('messages');
  const thinking = document.createElement('div');
  thinking.className = 'message assistant';
  thinking.id = 'thinking';
  thinking.innerHTML = `<div class="msg-avatar">✦</div><div class="thinking"><span></span><span></span><span></span></div>`;
  msgs.appendChild(thinking);
  msgs.scrollTop = msgs.scrollHeight;
  document.getElementById('sendBtn').disabled = true;
  document.getElementById('autoBtn').disabled = true;

  try {
    const response = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/${state.model}:generateContent?key=${state.apiKey}`,
      {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          system_instruction: buildSystemPrompt(),
          contents: state.sessions[NARRATOR_ID],
          generationConfig: { temperature: 0.95, maxOutputTokens: 800 },
        })
      }
    );
    const data = await response.json();
    if (!response.ok) throw new Error(data.error?.message || '오류 발생');
    const reply = data.candidates?.[0]?.content?.parts?.[0]?.text || '(응답 없음)';
    state.sessions[NARRATOR_ID].push({ role: 'model', parts: [{ text: reply }] });
    save();
  } catch (err) {
    state.sessions[NARRATOR_ID].pop();
    save();
    showToast('오류: ' + err.message);
  }

  document.getElementById('thinking')?.remove();
  document.getElementById('sendBtn').disabled = false;
  document.getElementById('autoBtn').disabled = false;
  renderMessages();
  updateTokenCounter();
}

// ========== 요약 생성 ==========
async function generateSummary() {
  if (!state.apiKey) { showToast('API 키를 입력해주세요.'); return; }
  const history = state.sessions[NARRATOR_ID] || [];
  if (!history.length) { showToast('대화 내용이 없습니다.'); return; }

  showToast('요약 생성 중...');
  switchTab('summary');

  const historyText = history.map(m =>
    `${m.role === 'user' ? '[아라 행동]' : '[나레이터]'}: ${m.parts[0]?.text}`
  ).join('\n');

  try {
    const response = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/${state.model}:generateContent?key=${state.apiKey}`,
      {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          contents: [{
            role: 'user',
            parts: [{ text: `다음 롤플레이 세션을 요약해줘. 다음 세션에서 맥락 유지를 위한 메모로 사용되므로, 주요 사건·관계 변화·등장한 인물·미해결 복선을 간결하게 정리해줘.\n\n---\n${historyText}\n---\n\n요약:` }]
          }],
          generationConfig: { temperature: 0.4, maxOutputTokens: 1024 },
        })
      }
    );
    const data = await response.json();
    if (!response.ok) throw new Error(data.error?.message || '오류 발생');
    const summary = data.candidates?.[0]?.content?.parts?.[0]?.text || '';
    state.summaries[NARRATOR_ID] = summary;
    save();
    document.getElementById('summaryBox').value = summary;
    showToast('요약 완료!');
  } catch (err) {
    showToast('오류: ' + err.message);
  }
}

// ========== 자동 진행 ==========
async function autoAdvance() {
  if (!state.apiKey) { showToast('API 키를 입력해주세요.'); switchTab('settings'); return; }

  if (!state.sessions[NARRATOR_ID]) state.sessions[NARRATOR_ID] = [];
  const history = state.sessions[NARRATOR_ID];

  const triggerText = history.length === 0
    ? '세계관과 설정에 맞게 첫 장면을 열어줘. 아라가 감금된 방에서 아침을 맞이하는 장면으로 시작해. 아라의 행동은 출력하지 말고, 주변 상황과 환경 묘사로만 시작해.'
    : '지금 흐름에서 자연스럽게 다음 상황을 진행해줘. 아라 주변의 상황, 등장인물들의 움직임, 환경 변화만 출력해. 아라의 행동이나 대사는 절대 출력하지 마.';

  document.getElementById('autoBtn').disabled = true;
  document.getElementById('sendBtn').disabled = true;

  const msgs = document.getElementById('messages');
  const emptyState = msgs.querySelector('.empty-state');
  if (emptyState) emptyState.remove();

  const thinking = document.createElement('div');
  thinking.className = 'message assistant';
  thinking.id = 'thinking';
  thinking.innerHTML = `<div class="msg-avatar">✦</div><div class="thinking"><span></span><span></span><span></span></div>`;
  msgs.appendChild(thinking);
  msgs.scrollTop = msgs.scrollHeight;

  const tempHistory = [...history, { role: 'user', parts: [{ text: triggerText }] }];

  try {
    const response = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/${state.model}:generateContent?key=${state.apiKey}`,
      {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          system_instruction: buildSystemPrompt(),
          contents: tempHistory,
          generationConfig: { temperature: 1.0, maxOutputTokens: 800 },
        })
      }
    );
    const data = await response.json();
    if (!response.ok) throw new Error(data.error?.message || '오류 발생');
    const reply = data.candidates?.[0]?.content?.parts?.[0]?.text || '';
    state.sessions[NARRATOR_ID].push({ role: 'model', parts: [{ text: reply }] });
    save();
  } catch (err) {
    showToast('오류: ' + err.message);
  }

  document.getElementById('thinking')?.remove();
  document.getElementById('autoBtn').disabled = false;
  document.getElementById('sendBtn').disabled = false;
  renderMessages();
  updateTokenCounter();
}


function handleKey(e) {
  // 모바일(터치 기기)에서는 엔터 전송 안 함
  const isMobile = window.matchMedia('(max-width: 768px)').matches || navigator.maxTouchPoints > 0;
  if (isMobile) return;
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function toggleKey() {
  const input = document.getElementById('apiKey');
  input.type = input.type === 'password' ? 'text' : 'password';
}

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t, i) => {
    const tabs = ['chat', 'settings', 'summary'];
    t.classList.toggle('active', tabs[i] === tab);
  });
  document.querySelectorAll('.tab-content').forEach(c => {
    c.classList.toggle('active', c.id === `tab-${tab}`);
  });
  // 모바일 탭바 연동
  ['chat', 'settings', 'summary'].forEach(t => {
    const el = document.getElementById(`mtab-${t}`);
    if (el) el.classList.toggle('active', t === tab);
  });
}

function toggleMobileSidebar() {
  const sidebar = document.querySelector('.sidebar');
  const overlay = document.getElementById('sidebarOverlay');
  const isOpen = sidebar.classList.contains('mobile-open');
  if (isOpen) {
    sidebar.classList.remove('mobile-open');
    overlay.style.display = 'none';
  } else {
    sidebar.classList.add('mobile-open');
    overlay.style.display = 'block';
  }
}

function clearSession() {
  if (!confirm('현재 세션의 대화 기록을 초기화할까요?')) return;
  state.sessions[NARRATOR_ID] = [];
  save();
  renderMessages();
  updateTokenCounter();
  showToast('세션 초기화 완료');
}

function exportSession() {
  const exportData = {
    version: 1,
    exportedAt: new Date().toISOString(),
    sessions: state.sessions,
    summaries: state.summaries,
  };
  const blob = new Blob([JSON.stringify(exportData, null, 2)], { type: 'application/json;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `아라_세션_${new Date().toLocaleDateString('ko').replace(/\./g,'-').replace(/ /g,'')}.json`;
  a.click();
  showToast('세션 내보내기 완료!');
}

function importSession(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const data = JSON.parse(e.target.result);
      if (!data.sessions) throw new Error('올바른 세션 파일이 아닙니다.');
      if (!confirm('현재 세션을 불러온 파일로 덮어씌울까요?')) return;
      state.sessions = data.sessions;
      state.summaries = data.summaries || {};
      // 나레이터 세션 누락 시 초기화
      if (!state.sessions[NARRATOR_ID]) state.sessions[NARRATOR_ID] = [];
      save();
      renderMessages();
      updateTokenCounter();
      // 요약도 복원
      const sum = state.summaries[NARRATOR_ID];
      if (sum) document.getElementById('summaryBox').value = sum;
      showToast('세션 불러오기 완료!');
    } catch (err) {
      showToast('오류: ' + err.message);
    }
    event.target.value = ''; // 같은 파일 재선택 가능하게
  };
  reader.readAsText(file);
}

function updateTokenCounter() {
  const history = state.sessions[NARRATOR_ID] || [];
  const chars = history.reduce((sum, m) => sum + (m.parts[0]?.text?.length || 0), 0);
  const est = Math.round(chars / 3);
  const el = document.getElementById('tokenCounter');
  el.textContent = history.length ? `누적 ${history.filter(m=>m.role==='user').length}턴 · 약 ${est.toLocaleString()} 토큰 추정` : '';
}

function exportSession() {
  if (!state.activeCharId) return;
  const char = state.characters.find(c => c.id === state.activeCharId);
  const history = state.sessions[state.activeCharId] || [];
  const text = history.map(m =>
    `[${m.role === 'user' ? '나' : char?.name}]\n${m.parts[0]?.text}`
  ).join('\n\n---\n\n');
  const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `ZETA_${char?.name}_${new Date().toLocaleDateString('ko')}.txt`;
  a.click();
}

function saveSummaryEdit() {
  state.summaries[NARRATOR_ID] = document.getElementById('summaryBox').value;
  save();
}

function copySummary() {
  const text = document.getElementById('summaryBox').value;
  navigator.clipboard.writeText(text).then(() => showToast('복사됨'));
}

function clearSummary() {
  if (!confirm('요약을 초기화할까요?')) return;
  state.summaries[NARRATOR_ID] = '';
  save();
  document.getElementById('summaryBox').value = '';
  showToast('초기화 완료');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ESC로 모달 닫기
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});

// 클라우드 미연결 시 localStorage로 fallback
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', () => { if (!window.saveToCloud) init(); });
} else {
  if (!window.saveToCloud) init();
}
</script>
</body>
</html>
